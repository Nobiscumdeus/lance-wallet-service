version: '3.8'

services:

  # ─────────────────────────────────────────────
  # PostgreSQL — alpine, already small
  # Data persisted in a named volume so it survives
  # container restarts
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: lance_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lance_wallet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Backend — multi-stage build, non-root user
  # Waits for postgres healthcheck before starting
  # so it never boots before the database is ready
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lance_backend
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to use the Docker service name
      # 'postgres' resolves to the postgres container internally
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lance_wallet
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Frontend — static files served by nginx
  # No Node.js in this container at runtime at all
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lance_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    # Named volume — data survives docker-compose down
    # Use docker-compose down -v to also delete the data
