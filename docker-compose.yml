version:  '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lance_postgres
    environment:
      POSTGRES_USER: lance
      POSTGRES_PASSWORD: lance
      POSTGRES_DB: lance_wallet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD_SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lance_backend
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lance_frontend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  
